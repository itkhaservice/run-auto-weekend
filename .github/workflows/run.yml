name: Auto Delete Paid Fees Weekly

on:
  schedule:
    # 02:00 UTC Chủ Nhật = 09:00 sáng Việt Nam Chủ Nhật
    - cron: '0 2 * * 0'
  workflow_dispatch: # Cho phép bấm nút chạy thủ công trên GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cho phép push code lên repo
    env:
      PYTHONUNBUFFERED: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run Report Data Script
        run: |
          pytest du_lieu_bao_cao.py

      - name: Push Report Data (Public JSON)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.xlsx report.json
          git commit -m "chore: update report data [skip ci]" || echo "No changes to commit"
          git push

      - name: Run Delete Paid Fees & Trash Script
        if: always()
        run: |
          python cap_nhat_xoa_da_thanh_toan.py

      - name: Push Cleanup Logs
        if: always()
        run: |
          git add cleanup_results.json
          git commit -m "chore: update cleanup logs [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Log & Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-artifacts
          path: |
            run.log
            *.png
          retention-days: 30
